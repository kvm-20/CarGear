<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2200"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
  </defs>

  <!-- Fondo negro redondeado -->
  <rect width="32" height="32" rx="7" fill="#080808"/>

  <!-- 8 dientes del engranaje -->
  <rect x="13" y="0.5" width="6" height="8" rx="2" fill="url(#g)"/>
  <rect x="13" y="0.5" width="6" height="8" rx="2" fill="url(#g)" transform="rotate(45 16 16)"/>
  <rect x="13" y="0.5" width="6" height="8" rx="2" fill="url(#g)" transform="rotate(90 16 16)"/>
  <rect x="13" y="0.5" width="6" height="8" rx="2" fill="url(#g)" transform="rotate(135 16 16)"/>
  <rect x="13" y="0.5" width="6" height="8" rx="2" fill="url(#g)" transform="rotate(180 16 16)"/>
  <rect x="13" y="0.5" width="6" height="8" rx="2" fill="url(#g)" transform="rotate(225 16 16)"/>
  <rect x="13" y="0.5" width="6" height="8" rx="2" fill="url(#g)" transform="rotate(270 16 16)"/>
  <rect x="13" y="0.5" width="6" height="8" rx="2" fill="url(#g)" transform="rotate(315 16 16)"/>

  <!-- Cuerpo exterior naranja -->
  <circle cx="16" cy="16" r="9.5" fill="url(#g)"/>
  <!-- Interior oscuro -->
  <circle cx="16" cy="16" r="8" fill="#080808"/>
  <!-- Anillo naranja interior -->
  <circle cx="16" cy="16" r="7.5" fill="none" stroke="url(#g)" stroke-width="2.5"/>
  <!-- Radios -->
  <line x1="16" y1="10" x2="16" y2="22" stroke="#FF6B00" stroke-width="2"/>
  <line x1="10" y1="16" x2="22" y2="16" stroke="#FF6B00" stroke-width="2"/>
  <!-- Centro -->
  <circle cx="16" cy="16" r="3.5" fill="url(#g)"/>
  <circle cx="16" cy="16" r="1.8" fill="#080808"/>
</svg>
